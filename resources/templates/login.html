<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login / Register</title>
    <link rel="icon" type="image/x-icon" href="../static/assets/images/icono.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="../static/styles/loginCSS.css" />
    <link rel="stylesheet" href="../static/styles/footerCSS.css" />
    <link rel="stylesheet" href="../static/styles/headerCSS.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <img src="../static/assets/images/Without_back_logo.png" alt="Nexgym" />
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
          data-bs-target="#navbarResponsive" aria-controls="navbarResponsive"
          aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
          <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">HOME</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Wrapper que centra el formulario entre navbar y footer -->
    <div class="login-wrapper">
      <div class="auth-container">
        <ul class="tabs">
          <li class="tab active" data-target="login">Login</li>
          <li class="tab" data-target="register">Register</li>
        </ul>

        <div class="forms">
          <!-- LOGIN FORM -->
          <form id="login" class="form active">
            <h2 class="form-title">Login</h2>
            <div class="form-group">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" placeholder="Email" />
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" placeholder="Password" />
            </div>
            <button type="submit" class="btn primary"
              onclick="window.location.href = 'profile.html'">Login</button>
          </form>

          <!-- REGISTER FORM -->
          <form id="register" class="form">
            <h2 class="form-title">Register</h2>
            <div class="form-group">
              <label for="reg-name">Name</label>
              <input type="text" id="reg-name" placeholder="Name" />
            </div>
            <div class="form-group">
              <label for="reg-surname">Surname</label>
              <input type="text" id="reg-surname" placeholder="Surname" />
            </div>
            <div class="form-group">
              <label for="reg-email">Email</label>
              <input type="email" id="reg-email" placeholder="Email" />
            </div>
            <div class="form-group">
              <label for="reg-email2">Confirm Email</label>
              <input type="email" id="reg-email2" placeholder="Confirm Email" />
            </div>
            <div class="form-group">
              <label for="reg-pass">Password</label>
              <input type="password" id="reg-pass" placeholder="Password" />
            </div>
            <button type="submit" class="btn primary"
              onclick="window.location.href = 'payment.html'">Register</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer py-0 bg-black text-white border-top border-dark">
      <div class="container-fluid px-md-5">
        <div class="row align-items-center m-0 g-0" style="min-height: 50px">
          <div class="col-lg-3 text-center text-lg-start py-1">
            <img src="../static/assets/images/Without_back_logo.png" alt="NexGym Logo"
              class="footer-logo-img" style="height: 50px" />
            <span class="social-links ms-2">
              <a href="https://www.instagram.com" class="text-light me-2 small"><i class="bi bi-instagram"></i></a>
              <a href="https://twitter.com" class="text-light me-2 small"><i class="bi bi-twitter-x"></i></a>
              <a href="https://www.facebook.com" class="text-light me-2 small"><i class="bi bi-facebook"></i></a>
            </span>
          </div>
          <div class="col-lg-6 py-1">
            <div class="d-flex justify-content-center flex-wrap footer-links">
              <a href="#faq" class="mx-2 my-0 small text-decoration-none">FAQ</a>
              <a href="#contact" class="mx-2 my-0 small text-decoration-none">Contact</a>
              <a href="#privacy" class="mx-2 my-0 small text-decoration-none">Privacy</a>
              <a href="#terms" class="mx-2 my-0 small text-decoration-none">Terms</a>
            </div>
          </div>
          <div class="col-lg-3 text-center text-lg-end py-1">
            <p class="text-light mb-0" style="font-size: 0.7rem">© 2026 NEXGYM.</p>
          </div>
        </div>
      </div>
    </footer>

    <script src="../static/js/appLogin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
